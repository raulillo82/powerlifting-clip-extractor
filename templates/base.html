<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Powerlifting Clip Extractor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    pre { white-space: pre-wrap; word-break: break-word; }
    [data-lang-btn] { opacity: 0.4; transition: opacity .15s; }
    [data-lang-btn].active { opacity: 1; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Powerlifting Clip Extractor</a>
      <div class="d-flex gap-1">
        <button data-lang-btn="es" onclick="applyLang('es')"
                class="btn btn-sm btn-dark border-0 p-1 lh-1" style="font-size:1.4rem"
                title="Español">🇪🇸</button>
        <button data-lang-btn="en" onclick="applyLang('en')"
                class="btn btn-sm btn-dark border-0 p-1 lh-1" style="font-size:1.4rem"
                title="English">🇬🇧</button>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

      'expired.desc':          'Estos archivos se eliminaron automáticamente del servidor 24 horas después de que finalizó la extracción.',
    }
  };

  let currentLang = 'en';

  function applyLang(lang) {
    if (!TRANSLATIONS[lang]) return;
    currentLang = lang;
    const T = TRANSLATIONS[lang];

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = T[el.dataset.i18n];
      if (v !== undefined) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const v = T[el.dataset.i18nPlaceholder];
      if (v !== undefined) el.placeholder = v;
    });

    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);

    document.querySelectorAll('[data-lang-btn]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.langBtn === lang);
    });

    // Let status page re-render dynamic text when language changes
    if (typeof onLangChange === 'function') onLangChange(T);
  }
  </script>

  {% block scripts %}{% endblock %}

  <script>
  applyLang(localStorage.getItem('lang') || 'en');
  </script>
</body>
</html>
