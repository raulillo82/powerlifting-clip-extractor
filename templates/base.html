  <style>
    pre { white-space: pre-wrap; word-break: break-word; }
    [data-lang-btn] { opacity: 0.4; transition: opacity .15s; }
    [data-lang-btn].active { opacity: 1; }
    .navbar { transition: transform .3s ease; }
    .navbar-hidden { transform: translateY(-100%); }
  </style>

  <nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">Powerlifting Clip Extractor</a>

        {% if current_user.is_authenticated %}
        <span class="text-white-50 small">Hola, {{ current_user.display_name }}</span>
        {% if current_user.is_admin %}
        <a href="{{ url_for('admin.index') }}" class="btn btn-sm btn-outline-light border-0 py-0">Admin</a>
        {% endif %}
        <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-light border-0 py-0">Salir</a>
        <div class="vr bg-secondary mx-1"></div>
        {% endif %}
        <div class="d-flex gap-1">
        <button data-lang-btn="es" onclick="applyLang('es')"
                class="btn btn-sm btn-dark border-0 p-1 lh-1" style="font-size:1.4rem"
                title="Español">🇪🇸</button>

                class="btn btn-sm btn-dark border-0 p-1 lh-1" style="font-size:1rem"
                title="English">🇬🇧🇺🇸</button>
        </div>
      </div>
    </div>
  </nav>

  let currentLang = 'en';

  function applyLang(lang) {
    if (!TRANSLATIONS[lang]) return;
    currentLang = lang;
    const T = TRANSLATIONS[lang];

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = T[el.dataset.i18n];
      if (v !== undefined) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const v = T[el.dataset.i18nPlaceholder];
      if (v !== undefined) el.placeholder = v;
    });

    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);

    document.querySelectorAll('[data-lang-btn]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.langBtn === lang);
    });

    // Let status page re-render dynamic text when language changes
    if (typeof onLangChange === 'function') onLangChange(T);
  }

  <script>
  applyLang(localStorage.getItem('lang') || 'en');

  const _nav = document.querySelector('.navbar');
  document.body.style.paddingTop = _nav.offsetHeight + 'px';

  let _lastY = window.scrollY, _hideTimer = null;
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y <= 0) {
      _nav.classList.remove('navbar-hidden');
      clearTimeout(_hideTimer);
    } else if (y > _lastY) {
      _nav.classList.add('navbar-hidden');
      clearTimeout(_hideTimer);
    } else {
      _nav.classList.remove('navbar-hidden');
      clearTimeout(_hideTimer);
      _hideTimer = setTimeout(() => _nav.classList.add('navbar-hidden'), 2000);
    }
    _lastY = y;
  }, { passive: true });
  </script>
