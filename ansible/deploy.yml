---
# Deploys the app to a target host (RPi5 or RPi4) using a Podman container.
#
# Usage:
#   ansible-playbook -i inventory.yml deploy.yml -l rpi4
#
# Prerequisites on the target host (install once manually):
#   sudo zypper install -y git podman nginx
#   loginctl enable-linger raul
#
# Sudo permissions required (become: true for nginx tasks only):
#   Option A — full sudo (simplest):
#     raul ALL=(ALL) ALL      (use --ask-become-pass when running)
#   Option B — minimal passwordless sudo for nginx only:
#     raul ALL=(root) NOPASSWD: /usr/bin/systemctl start nginx, \
#       /usr/bin/systemctl enable nginx, /usr/bin/systemctl reload nginx, \
#       /usr/bin/tee /etc/nginx/conf.d/powerlifting.conf
#
# Before running for failover:
#   1. Copy secret.key from RPi5:
#      scp raspberrypi5:~/powerlifting-clip-extractor/secret.key \
#          raspberrypi4:~/powerlifting-clip-extractor/secret.key
#   2. Copy users.db from RPi5:
#      scp raspberrypi5:~/powerlifting-clip-extractor/users.db \
#          raspberrypi4:~/powerlifting-clip-extractor/users.db
#   3. Copy SSL certs from RPi5:
#      sudo scp -r raspberrypi5:/etc/nginx/ssl /etc/nginx/ssl
#   4. Change the router port-forwarding rule from RPi5's IP to RPi4's.
#
# After failover, to switch back to RPi5: reverse steps 1-2 (copy DB back)
# and restore the original port-forwarding.

- name: Deploy Powerlifting Clip Extractor
  hosts: all
  vars:
    service_name: powerlifting
    image_name: "localhost/powerlifting:latest"
    container_port: "127.0.0.1:5000:5000"
    nginx_conf: /etc/nginx/conf.d/powerlifting.conf
    domain: raulillo82.duckdns.org

  tasks:

    - name: Ensure podman is installed
      become: true
      zypper:
        name: podman
        state: present

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        update: true
        force: false
      register: git_result

    - name: Build container image
      command: podman build -t "{{ image_name }}" "{{ app_dir }}"
      changed_when: true
      when: git_result.changed or ansible_check_mode == false

    - name: Ensure lifts directory exists
      file:
        path: "{{ app_dir }}/lifts"
        state: directory
        mode: "0755"

    - name: Ensure users.db file exists (app populates it on init)
      file:
        path: "{{ app_dir }}/users.db"
        state: touch
        mode: "0644"
      changed_when: false

    - name: Ensure secret.key file exists (app generates key on first run)
      file:
        path: "{{ app_dir }}/secret.key"
        state: touch
        mode: "0600"
      changed_when: false

    - name: Check for github_pat.key (needed for feedback → GitHub issues)
      stat:
        path: "{{ app_dir }}/github_pat.key"
      register: github_pat_stat

    - name: Warn if github_pat.key missing (feedback form will return error without it)
      debug:
        msg: >
          github_pat.key not found at {{ app_dir }}/github_pat.key.
          Create a fine-grained GitHub PAT with issues:write on this repo and save it there (chmod 600).
      when: not github_pat_stat.stat.exists

    - name: Check for webhook_secret.key (needed to verify GitHub webhook events)
      stat:
        path: "{{ app_dir }}/webhook_secret.key"
      register: webhook_secret_stat

    - name: Warn if webhook_secret.key missing (webhook endpoint will reject all events)
      debug:
        msg: >
          webhook_secret.key not found at {{ app_dir }}/webhook_secret.key.
          Generate with: openssl rand -hex 32 > {{ app_dir }}/webhook_secret.key && chmod 600 {{ app_dir }}/webhook_secret.key
          Then configure the same value as the GitHub webhook secret.
      when: not webhook_secret_stat.stat.exists

    - name: Create empty github_pat.key placeholder (for bind mount)
      file:
        path: "{{ app_dir }}/github_pat.key"
        state: touch
        mode: "0600"
      changed_when: false
      when: not github_pat_stat.stat.exists

    - name: Create empty webhook_secret.key placeholder (for bind mount)
      file:
        path: "{{ app_dir }}/webhook_secret.key"
        state: touch
        mode: "0600"
      changed_when: false
      when: not webhook_secret_stat.stat.exists

    - name: Initialise database (idempotent)
      command: >
        podman run --rm
        -v {{ app_dir }}/users.db:/app/users.db:Z
        -v {{ app_dir }}/secret.key:/app/secret.key:Z
        {{ image_name }}
        python3 -c 'from db import init_db; init_db()'
      args:
        chdir: "{{ app_dir }}"
      changed_when: false
      ignore_errors: "{{ ansible_check_mode }}"

    - name: Create systemd user service directory
      file:
        path: /home/{{ ansible_user }}/.config/systemd/user
        state: directory
        mode: "0755"

    - name: Resolve real path of users.db (handles symlinks)
      command: realpath "{{ app_dir }}/users.db"
      register: users_db_real
      changed_when: false

    - name: Check for GeoLite2-City.mmdb (needed for /admin/stats geolocation)
      stat:
        path: "{{ app_dir }}/GeoLite2-City.mmdb"
      register: geoip_stat

    - name: Warn if GeoLite2-City.mmdb missing (geo stats disabled until downloaded)
      debug:
        msg: >
          GeoLite2-City.mmdb not found at {{ app_dir }}/GeoLite2-City.mmdb.
          Download GeoLite2 City (MMDB format) from https://www.maxmind.com/en/geolite2/signup
          and place it there to enable geolocation in /admin/stats.
      when: not geoip_stat.stat.exists

    - name: Create empty GeoLite2-City.mmdb placeholder (for bind mount)
      file:
        path: "{{ app_dir }}/GeoLite2-City.mmdb"
        state: touch
        mode: "0644"
      changed_when: false
      when: not geoip_stat.stat.exists

    - name: Deploy systemd user service
      copy:
        dest: /home/{{ ansible_user }}/.config/systemd/user/{{ service_name }}.service
        content: |
          [Unit]
          Description=Powerlifting Clip Extractor (podman)
          After=network.target

          [Service]
          Type=simple
          ExecStartPre=-/usr/bin/podman rm -f {{ service_name }}
          ExecStart=/usr/bin/podman run \
              --name {{ service_name }} \
              --rm \
              -p {{ container_port }} \
              -v {{ users_db_real.stdout }}:/app/users.db:Z \
              -v {{ app_dir }}/secret.key:/app/secret.key:Z \
              -v {{ app_dir }}/lifts:/app/lifts:Z \
              -v {{ app_dir }}/GeoLite2-City.mmdb:/app/GeoLite2-City.mmdb:Z \
              -v {{ app_dir }}/github_pat.key:/app/github_pat.key:Z \
              -v {{ app_dir }}/webhook_secret.key:/app/webhook_secret.key:Z \
              {{ image_name }}
          ExecStop=/usr/bin/podman stop {{ service_name }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
      notify: Restart app

    - name: Enable systemd linger (start services at boot without login)
      command: loginctl enable-linger {{ ansible_user }}
      changed_when: false

    - name: Enable and start service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started
        scope: user
        daemon_reload: true
      ignore_errors: "{{ ansible_check_mode }}"

    - name: Deploy nginx config
      become: true
      ignore_errors: "{{ ansible_check_mode }}"
      tags: nginx
      copy:
        dest: "{{ nginx_conf }}"
        content: |
          server {
              listen 80;
              server_name {{ domain }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl;
              server_name {{ domain }};

              ssl_certificate     /etc/nginx/ssl/raulillo82.crt;
              ssl_certificate_key /etc/nginx/ssl/raulillo82.key;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         HIGH:!aNULL:!MD5;

              client_max_body_size 20M;

              location /staging/ {
                  proxy_pass         http://127.0.0.1:5001/;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   X-Forwarded-Prefix /staging;
                  proxy_read_timeout 600;
                  proxy_send_timeout 600;
              }

              location / {
                  proxy_pass         http://127.0.0.1:5000;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 600;
                  proxy_send_timeout 600;
              }
          }
      notify: Reload nginx

    - name: Ensure nginx is enabled and running
      become: true
      ignore_errors: "{{ ansible_check_mode }}"
      tags: nginx
      systemd:
        name: nginx
        enabled: true
        state: started

    - name: Ensure ~/.local/bin exists
      file:
        path: /home/{{ ansible_user }}/.local/bin
        state: directory
        mode: "0755"

    - name: Check for ~/.maxmind_key (needed for GeoLite2 auto-update)
      stat:
        path: /home/{{ ansible_user }}/.maxmind_key
      register: maxmind_key_stat

    - name: Warn if ~/.maxmind_key missing (geoip-update timer will fail without it)
      debug:
        msg: >
          ~/.maxmind_key not found. Create it with your MaxMind license key (chmod 600)
          so the geoip-update timer can refresh GeoLite2-City.mmdb automatically.
      when: not maxmind_key_stat.stat.exists

    - name: Deploy GeoLite2 update script
      copy:
        dest: /home/{{ ansible_user }}/.local/bin/geoip-update.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail
          LICENSE_KEY=$(cat ~/.maxmind_key | tr -d '[:space:]')
          TMP=$(mktemp -d)
          cleanup() { rm -rf "$TMP"; }
          trap cleanup EXIT
          echo "Descargando GeoLite2-City.mmdb..."
          curl -sL --fail \
            "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${LICENSE_KEY}&suffix=tar.gz" \
            -o "$TMP/GeoLite2-City.tar.gz"
          tar -xzf "$TMP/GeoLite2-City.tar.gz" -C "$TMP"
          MMDB=$(find "$TMP" -name 'GeoLite2-City.mmdb' | head -1)
          cp "$MMDB" ~/powerlifting-clip-extractor/GeoLite2-City.mmdb
          cp "$MMDB" ~/powerlifting-clip-extractor-staging/GeoLite2-City.mmdb
          echo "Instalado: $(du -h ~/powerlifting-clip-extractor/GeoLite2-City.mmdb | cut -f1)"
          systemctl --user restart powerlifting
          systemctl --user restart powerlifting-staging
          echo "Contenedores reiniciados."

    - name: Deploy geoip-update systemd service
      copy:
        dest: /home/{{ ansible_user }}/.config/systemd/user/geoip-update.service
        content: |
          [Unit]
          Description=Update GeoLite2-City.mmdb from MaxMind

          [Service]
          Type=oneshot
          ExecStart=%h/.local/bin/geoip-update.sh
          StandardOutput=journal
          StandardError=journal

    - name: Deploy geoip-update systemd timer (first Tuesday of each month at 03:00)
      copy:
        dest: /home/{{ ansible_user }}/.config/systemd/user/geoip-update.timer
        content: |
          [Unit]
          Description=Refresh GeoLite2-City.mmdb on the first Tuesday of each month

          [Timer]
          OnCalendar=Tue *-*-1..7 03:00:00
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify: Reload geoip timer

    - name: Enable geoip-update timer
      systemd:
        name: geoip-update.timer
        enabled: true
        state: started
        scope: user
        daemon_reload: true
      ignore_errors: "{{ ansible_check_mode }}"

  handlers:

    - name: Restart app
      systemd:
        name: "{{ service_name }}"
        state: restarted
        scope: user
        daemon_reload: true
      ignore_errors: "{{ ansible_check_mode }}"

    - name: Reload nginx
      become: true
      tags: nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Reload geoip timer
      systemd:
        name: geoip-update.timer
        state: started
        scope: user
        daemon_reload: true
      ignore_errors: "{{ ansible_check_mode }}"
