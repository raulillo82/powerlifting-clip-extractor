---
# Configures the staging environment on RPi5 (podman-based).
# Run once after the initial clone of ~/powerlifting-clip-extractor-staging/,
# and any time the staging service needs updating.
#
# Usage:
#   ansible-playbook -i inventory.yml staging.yml
#
# Prerequisites on RPi5 (done once manually):
#   git clone https://github.com/raulillo82/powerlifting-clip-extractor.git \
#       ~/powerlifting-clip-extractor-staging

- name: Configure Staging Environment
  hosts: rpi5
  vars:
    service_name: powerlifting-staging
    image_name: "localhost/powerlifting-staging:latest"
    container_port: "127.0.0.1:5001:5000"
    staging_dir: "/home/{{ ansible_user }}/powerlifting-clip-extractor-staging"

  tasks:

    - name: Fix users.db — replace symlink with independent copy
      shell: |
        db="{{ staging_dir }}/users.db"
        if [ -L "$db" ]; then
          real=$(realpath "$db")
          rm "$db"
          cp "$real" "$db"
          echo "replaced"
        else
          echo "ok"
        fi
      register: db_fix
      changed_when: db_fix.stdout == 'replaced'

    - name: Ensure lifts directory exists
      file:
        path: "{{ staging_dir }}/lifts"
        state: directory
        mode: "0755"

    - name: Ensure secret.key exists
      file:
        path: "{{ staging_dir }}/secret.key"
        state: touch
        mode: "0600"
      changed_when: false

    - name: Build staging container image
      command: podman build -t "{{ image_name }}" "{{ staging_dir }}"
      changed_when: true

    - name: Initialise database (idempotent)
      command: >
        podman run --rm
        -v {{ staging_dir }}/users.db:/app/users.db:Z
        -v {{ staging_dir }}/secret.key:/app/secret.key:Z
        {{ image_name }}
        python3 -c 'from db import init_db; init_db()'
      changed_when: false

    - name: Deploy staging systemd user service
      copy:
        dest: "/home/{{ ansible_user }}/.config/systemd/user/{{ service_name }}.service"
        content: |
          [Unit]
          Description=Powerlifting Clip Extractor — STAGING (podman)
          After=network.target

          [Service]
          Type=simple
          Environment=STAGING=1
          ExecStartPre=-/usr/bin/podman rm -f {{ service_name }}
          ExecStart=/usr/bin/podman run \
              --name {{ service_name }} \
              --rm \
              -p {{ container_port }} \
              -v {{ staging_dir }}/users.db:/app/users.db:Z \
              -v {{ staging_dir }}/secret.key:/app/secret.key:Z \
              -v {{ staging_dir }}/lifts:/app/lifts:Z \
              {{ image_name }}
          ExecStop=/usr/bin/podman stop {{ service_name }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
      notify: Restart staging service

    - name: Enable and start staging service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started
        scope: user
        daemon_reload: true

  handlers:

    - name: Restart staging service
      systemd:
        name: "{{ service_name }}"
        state: restarted
        scope: user
        daemon_reload: true
