name: Tests

on:
  push:
    paths-ignore:
      - '**.md'
      - 'prompt.txt'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'prompt.txt'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest flask flask-login

      - run: pytest test_extract_lifts.py test_app.py -v
