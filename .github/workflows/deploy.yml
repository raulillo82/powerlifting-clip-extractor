name: Deploy

on:
  push:
    paths-ignore:
      - '**.md'
      - 'prompt.txt'
      - '.gitignore'

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Pull and restart production
        run: |
          cd ~/powerlifting-clip-extractor
          git pull
          systemctl --user restart powerlifting
          systemctl --user is-active powerlifting

  deploy-staging:
    if: github.ref != 'refs/heads/main' && github.ref_name == vars.STAGING_BRANCH
    runs-on: self-hosted
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Deploy branch to staging
        run: |
          cd ~/powerlifting-clip-extractor-staging
          git fetch
          git checkout ${{ github.ref_name }}
          git pull
          systemctl --user restart powerlifting-staging
          systemctl --user is-active powerlifting-staging
