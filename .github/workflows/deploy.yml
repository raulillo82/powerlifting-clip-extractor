name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'prompt.txt'
      - '.gitignore'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull and restart
        run: |
          cd ~/powerlifting-clip-extractor
          git pull
          systemctl --user restart powerlifting
          systemctl --user is-active powerlifting
